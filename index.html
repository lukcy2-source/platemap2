<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球板塊留言板 - 精確校正版</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; }
        #map { height: 100vh; width: 100%; background: #ffffff; }
        
        .header-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid #dcdfe6;
        }

        .comment-section {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #ebeef5;
            margin-top: 10px;
            padding: 8px;
            background: #fafafa;
        }
        .comment-item { 
            margin-bottom: 8px; 
            padding-bottom: 8px; 
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .comment-item strong { color: #409eff; }
        .add-btn {
            background: #67c23a;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
        }
        .add-btn:hover { background: #85ce61; }
    </style>
</head>
<body>

<div class="header-box">
    <h2 style="margin:0; color:#303133;">🌍 板塊構造互動地圖 (精密校準)</h2>
    <span style="font-size: 12px; color:#909399;">本初子午線已校準於 255px 位置</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // --- 1. Firebase 配置 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDD3RepU3OyEzhu9OVyEJnXQkqXs9q3hsQ",
        authDomain: "platemap2-b7c66.firebaseapp.com",
        databaseURL: "https://platemap2-b7c66-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "platemap2-b7c66",
        storageBucket: "platemap2-b7c66.appspot.com",
        messagingSenderId: "618061351875",
        appId: "1:618061351875:web:cf2ee7e4a19ccd3b7a0b76"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('class_activity');

    // --- 2. 初始化地圖與底圖名稱 ---
    const imgW = 1794;
    const imgH = 1002;
    const imageUrl = 'imageUrl'; // 確保檔案名正確

    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 2,
        attributionControl: false
    });

    const bounds = [[0, 0], [imgH, imgW]];
    L.imageOverlay(imageUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    // --- 3. 核心校準公式 (關鍵修改點) ---
    function geoToPixel(lat, lon) {
        // 經度計算：以 255 像素為 0 度起點，每度位移 (224.25 / 45) 像素
        let x = 255 + (lon * (224.25 / 45));
        
        // 緯度計算：假設赤道 (0度) 在圖片高度中央 (501px)
        // 若赤道位置有偏，可將 501 進行微調
        let y = 501 + (lat * (1002 / 180));
        
        return [y, x];
    }

    // --- 4. 地點數據 ---
    const locations = [
        { id: 'EastAfrica', name: '東非大裂谷', lat: -0.20, lon: 36.20, desc: '板塊張裂形成的巨大斷裂帶。' },
        { id: 'SanAndreas', name: '聖安德烈雅斯斷層', lat: 35.10, lon: -119.30, desc: '平移邊界典型案例，太平洋板塊與北美洲板塊相互滑動。' },
        { id: 'Andes', name: '安第斯山脈', lat: -32.65, lon: -70.01, desc: '納斯卡板塊隱沒至南美板塊下方形成的褶皺山脈。' },
        { id: 'Iceland', name: '冰島', lat: 64.96, lon: -19.02, desc: '位於大西洋中洋脊上的火山島。' },
        { id: 'Java', name: '爪哇島', lat: -7.49, lon: 110.00, desc: '印澳板塊與歐亞板塊聚合。' },
        { id: 'Himalayas', name: '喜馬拉雅山脈', lat: 27.98, lon: 86.92, desc: '兩個大陸板塊相撞擠壓形成。' }
    ];

    // --- 5. 生成標記 ---
    locations.forEach(loc => {
        const pixelPos = geoToPixel(loc.lat, loc.lon);
        const marker = L.marker(pixelPos).addTo(map);

        const content = document.createElement('div');
        content.style.minWidth = "240px";
        content.innerHTML = `
            <strong style="font-size:16px; color:#409eff;">${loc.name}</strong><br>
            <p style="font-size:13px; color:#606266;">${loc.desc}</p>
            <div class="comment-section" id="box-${loc.id}">
                <div id="list-${loc.id}"><small>載入中...</small></div>
            </div>
            <button class="add-btn" onclick="postComment('${loc.id}')">✍️ 發表評論</button>
        `;
        marker.bindPopup(content);

        db.child(loc.id).on('value', (snapshot) => {
            const listContainer = document.getElementById(`list-${loc.id}`);
            if (!listContainer) return;
            listContainer.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'comment-item';
                    div.innerHTML = `<strong>${item.user}</strong>: ${item.msg}<br><small style="color:#C0C4CC;">${item.time}</small>`;
                    listContainer.appendChild(div);
                });
            } else {
                listContainer.innerHTML = "<center><small>暫無評論</small></center>";
            }
        });
    });

    // --- 6. 互動功能 ---
    window.postComment = function(locId) {
        const name = prompt("請輸入你的姓名：");
        if (!name) return;
        const comment = prompt("請輸入評論：");
        if (!comment) return;

        db.child(locId).push({
            user: name,
            msg: comment,
            time: new Date().toLocaleString()
        });
    };
</script>
</body>
</html>

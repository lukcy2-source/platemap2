<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球板塊留言板 - 精密校準版</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; }
        #map { height: 100vh; width: 100%; background: #ffffff; }
        
        .header-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid #dcdfe6;
        }

        .comment-section {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #ebeef5;
            margin-top: 10px;
            padding: 8px;
            background: #fafafa;
        }
        .comment-item { 
            margin-bottom: 8px; 
            padding-bottom: 8px; 
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .comment-item strong { color: #409eff; }
        .add-btn {
            background: #67c23a;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
            transition: 0.3s;
        }
        .add-btn:hover { background: #85ce61; }
    </style>
</head>
<body>

<div class="header-box">
    <h2 style="margin:0; color:#303133;">🌍 全球板塊地質互動地圖</h2>
    <span style="font-size: 12px; color:#909399;">點擊座標點進行評論，數據將即時同步全班</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // --- 1. Firebase 配置 (已校正為新加坡地區 URL) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDD3RepU3OyEzhu9OVyEJnXQkqXs9q3hsQ",
        authDomain: "platemap2-b7c66.firebaseapp.com",
        databaseURL: "https://platemap2-b7c66-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "platemap2-b7c66",
        storageBucket: "platemap2-b7c66.appspot.com",
        messagingSenderId: "618061351875",
        appId: "1:618061351875:web:cf2ee4e4a19ccd3b7a0b76"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('class_activity');

    // --- 2. 初始化自定義地圖底圖 ---
    const imgW = 1794;
    const imgH = 1002;
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 2,
        attributionControl: false
    });

    const bounds = [[0, 0], [imgH, imgW]];
    const imageUrl = 'platemap_background.png'; 
    L.imageOverlay(imageUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    // --- 3. 精密計算過程 (224.25 px / 45°) ---
    function geoToPixel(lat, lon) {
        // 經度計算：每 45 度為 224.25 px，總寬 1794 (45 * 8 = 360, 224.25 * 8 = 1794)
        let x = (lon + 180) * (224.25 / 45);
        
        // 緯度計算：總高 1002 對應 180 度 (-90 到 90)
        let y = (lat + 90) * (1002 / 180);
        
        return [y, x];
    }

    // --- 4. 教學考察地點數據 ---
    const locations = [
        { id: 'EastAfrica', name: '東非大裂谷', lat: -0.20, lon: 36.20, desc: '板塊張裂造成的巨大斷裂帶，未來可能形成新海洋。' },
        { id: 'SanAndreas', name: '聖安德烈雅斯斷層', lat: 35.10, lon: -119.30, desc: '平移邊界典型案例，太平洋板塊與北美洲板塊相互滑動。' },
        { id: 'Andes', name: '安第斯山脈', lat: -32.65, lon: -70.01, desc: '納斯卡板塊隱沒至南美板塊下方形成的褶皺山脈。' },
        { id: 'Iceland', name: '冰島', lat: 64.96, lon: -19.02, desc: '位於大西洋中洋脊，是少見在地表可見的張裂邊界。' },
        { id: 'Java', name: '爪哇島', lat: -7.49, lon: 110.00, desc: '印澳板塊與歐亞板塊聚合，火山活動極其頻繁。' },
        { id: 'Himalayas', name: '喜馬拉雅山脈', lat: 27.98, lon: 86.92, desc: '兩個大陸板塊相撞，使地殼劇烈抬升成為世界屋脊。' }
    ];

    // --- 5. 生成標記與留言載入 ---
    locations.forEach(loc => {
        const pixelPos = geoToPixel(loc.lat, loc.lon);
        const marker = L.marker(pixelPos).addTo(map);

        const content = document.createElement('div');
        content.style.minWidth = "240px";
        content.innerHTML = `
            <div style="border-bottom: 2px solid #409eff; padding-bottom:5px; margin-bottom:8px;">
                <strong style="font-size:16px;">${loc.name}</strong>
            </div>
            <p style="font-size:13px; color:#606266; line-height:1.4;">${loc.desc}</p>
            <div class="comment-section" id="box-${loc.id}">
                <div id="list-${loc.id}"><small>載入中...</small></div>
            </div>
            <button class="add-btn" onclick="postComment('${loc.id}')">我也要留言</button>
        `;

        marker.bindPopup(content);

        // 監聽 Firebase 分支數據
        db.child(loc.id).on('value', (snapshot) => {
            const listContainer = document.getElementById(`list-${loc.id}`);
            if (!listContainer) return;
            
            listContainer.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.values(data).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'comment-item';
                    div.innerHTML = `<strong>${item.user}</strong>: ${item.msg}<br><small style="color:#C0C4CC;">${item.time}</small>`;
                    listContainer.appendChild(div);
                });
                // 自動滾動到最新留言
                const box = document.getElementById(`box-${loc.id}`);
                box.scrollTop = box.scrollHeight;
            } else {
                listContainer.innerHTML = "<center><small style='color:#999;'>暫無評論，歡迎首位發言</small></center>";
            }
        });
    });

    // --- 6. 提交評論功能 ---
    window.postComment = function(locId) {
        const name = prompt("請輸入你的姓名：");
        if (!name) return;
        const comment = prompt("請輸入你的觀察或地質特徵描述：");
        if (!comment) return;

        db.child(locId).push({
            user: name,
            msg: comment,
            time: new Date().toLocaleString()
        });
    };

</script>
</body>
</html>

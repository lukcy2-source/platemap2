<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球板塊留言板 - 手動定位版</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; }
        #map { height: 100vh; width: 100%; background: #ffffff; }
        
        /* 頁首標題樣式 */
        .header-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid #dcdfe6;
        }

        /* 評論區樣式 */
        .comment-section {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #ebeef5;
            margin-top: 10px;
            padding: 8px;
            background: #fafafa;
        }
        .comment-item { 
            margin-bottom: 8px; 
            padding-bottom: 8px; 
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .comment-item strong { color: #409eff; }
        .add-btn {
            background: #67c23a;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="header-box">
    <h2 style="margin:0; color:#303133;">🌍 板塊構造互動地圖 (手動校準版)</h2>
    <span style="font-size: 12px; color:#f56c6c;">提示：按 F12 打開 Console，點擊地圖即可獲取座標</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // --- 【1. Firebase 配置】 ---
    const firebaseConfig = {
        apiKey: "AIzaSyDD3RepU3OyEzhu9OVyEJnXQkqXs9q3hsQ",
        authDomain: "platemap2-b7c66.firebaseapp.com",
        databaseURL: "https://platemap2-b7c66-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "platemap2-b7c66",
        storageBucket: "platemap2-b7c66.appspot.com",
        messagingSenderId: "618061351875",
        appId: "1:618061351875:web:cf2ee7e4a19ccd3b7a0b76"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('class_activity');

    // --- 【2. 底圖設定】 ---
    const imgW = 1794;
    const imgH = 1002;
    const imageUrl = 'imageUrl'; 

    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -1,
        maxZoom: 2,
        attributionControl: false
    });

    const bounds = [[0, 0], [imgH, imgW]];
    L.imageOverlay(imageUrl, bounds).addTo(map);
    map.fitBounds(bounds);

    // --- 【3. 地點數據：請在此手動更改座標 [Y, X] 】 ---
    const locations = [
        { id: 'EastAfrica', name: '東非大裂谷', pos: [557, 428], desc: '板塊張裂形成的巨大斷裂帶。' },
        { id: 'SanAndreas', name: '聖安德烈雅斯斷層', lat: 35.10, lon: -119.30, pos: [680, 1353], desc: '平移邊界典型案例。' },
        { id: 'Andes', name: '安第斯山脈', pos: [328, 1595], desc: '聚合型邊界形成的褶皺山脈。' },
        { id: 'Iceland', name: '冰島', pos: [891, 211], desc: '位於大西洋中洋脊上的火山島。' },
        { id: 'Java', name: '爪哇島', pos: [390, 745], desc: '印澳板塊與歐亞板塊聚合。' },
        { id: 'Himalayas', name: '喜馬拉雅山脈', pos: [643, 620], desc: '兩個大陸板塊相撞擠壓形成。' }
    ];

    // --- 【4. 標記生成與評論邏輯】 ---
    locations.forEach(loc => {
        // 直接使用手動設定的 pos
        const marker = L.marker(loc.pos).addTo(map);

        const content = document.createElement('div');
        content.style.minWidth = "240px";
        content.innerHTML = `
            <strong style="font-size:16px; color:#409eff;">${loc.name}</strong><br>
            <p style="font-size:13px; color:#606266;">${loc.desc}</p>
            <div class="comment-section" id="box-${loc.id}">
                <div id="list-${loc.id}"><small>載入中...</small></div>
            </div>
            <button class="add-btn" onclick="postComment('${loc.id}')">✍️ 發表評論</button>
        `;
        marker.bindPopup(content);

        db.child(loc.id).on('value', (snapshot) => {
            const listContainer = document.getElementById(`list-${loc.id}`);
            if (!listContainer) return;
            listContainer.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'comment-item';
                    div.innerHTML = `<strong>${item.user}</strong>: ${item.msg}<br><small style="color:#C0C4CC;">${item.time}</small>`;
                    listContainer.appendChild(div);
                });
            } else {
                listContainer.innerHTML = "<center><small>暫無評論</small></center>";
            }
        });
    });

    // --- 【5. 評論功能】 ---
    window.postComment = function(locId) {
        const name = prompt("請輸入你的姓名：");
        if (!name) return;
        const comment = prompt("請輸入評論：");
        if (!comment) return;
        db.child(locId).push({ user: name, msg: comment, time: new Date().toLocaleString() });
    };

    // --- 【6. 座標拾取器：手動定位必備工具】 ---
    map.on('click', function(e) {
        // 在網頁控制台印出 Y 和 X
        console.log("當前點擊座標 [Y, X]: [" + e.latlng.lat.toFixed(1) + ", " + e.latlng.lng.toFixed(1) + "]");
    });
</script>
</body>
</html>
